healing_characteristics:
  - Soft earlobe tissue may heal faster than cartilage per APP comparative guidance
  - Ear cartilage, navels, and nostrils are grouped as tougher tissue that may take six months or longer
  - Cartilage piercings may be prone to irritation bumps when slept on or snagged
  - Industrial piercings involve two cartilage channels and may require extended healing
  - Individual healing varies by anatomy, jewelry, health, and aftercare
aftercare_notes:
  - Spray sterile saline labeled for wound wash once or twice daily per APP body aftercare
  - Avoid sleeping on cartilage piercings; use pressure protection if needed
  - Do not rotate jewelry during cleaning
  - Avoid alcohol, hydrogen peroxide, and harsh antiseptics
  - Return to piercer for downsizing when swelling subsides — especially important for helix-type piercings per APP FAQ
product_considerations:
  - Primary aftercare: sterile saline wound wash (e.g. neilmed-piercing-aftercare-fine-mist, recovery-sterile-saline-wash-7-4oz, steri-wash-saline-spray, easypiercing-saline-solution-50ml)
  - Prefer simple isotonic sterile saline without botanical additives for cartilage aftercare editorial alignment
  - Retail ear aftercare products (studex-advanced-2-in-1-piercing-aftercare-cleanser, inverness-ear-care-solution) differ from APP-preferred sterile saline — evaluate separately
