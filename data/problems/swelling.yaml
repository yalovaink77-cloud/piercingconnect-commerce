id: swelling
slug: swelling

name: Swelling

summary: >
  Puffiness around a new piercing is common in the first days of healing and
  may also signal irritation or a need for professional review when it worsens.

description: |
  Swelling is one of the most frequently reported changes after a new piercing.
  Professional aftercare guidance and medical resources describe mild to moderate
  swelling as a normal part of early healing as the body responds to the new
  opening in the skin or cartilage.

  Swelling often peaks within the first few days and then gradually subsides when
  aftercare is consistent and the site is protected from pressure and trauma.
  However, swelling that increases after the initial period, spreads widely, or
  occurs with other concerning signs may warrant piercer or medical follow-up.

  Jewelry length and fit matter during swollen stages. Your piercer may recommend
  longer initial jewelry and a later downsizing once swelling settles. This
  record describes what users commonly observe — it does not diagnose any
  underlying condition.

symptoms:
  - Puffy or enlarged tissue around one or both sides of the piercing
  - Jewelry may feel tighter than when first inserted
  - Mild tenderness when moving the area or during cleaning
  - Swelling that is localized to the piercing site in early healing
  - Difficulty seeing full jewelry ends if swelling is pronounced
  - Swelling that reduces with rest and gentle aftercare in typical healing

possible_causes:
  - Normal inflammatory response during fresh and early healing
  - Trauma from sleeping on the piercing or accidental bumps
  - Jewelry that is too short for current swelling levels
  - Allergic or sensitivity reaction to jewelry material
  - Irritation from over-cleaning, harsh products, or frequent touching
  - Oral piercings swelling in response to hot, spicy, or acidic foods
  - Infection or significant irritation when swelling worsens with other signs
  - Fluid retention or hormonal changes affecting healing in some individuals

