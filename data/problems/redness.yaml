id: redness
slug: redness

name: Redness

summary: >
  Pink or red skin around a healing piercing is often expected early on and may
  also reflect irritation or a reason to seek review if it spreads or persists.

description: |
  Redness around a new piercing is commonly reported during the first days and
  weeks of healing. Piercing aftercare resources describe a pink or lightly red
  halo near the entry and exit points as a typical healing response, especially
  after cartilage or sensitive-area piercings.

  Redness from irritation — caused by jewelry friction, product sensitivity, or
  mechanical trauma — can look similar to redness associated with other concerns.
  The key difference users often notice is whether the redness stays localized
  and fades with gentle care, or whether it spreads, deepens, or appears with
  other worrisome signs.

  This record helps users understand common patterns without assigning a
  diagnosis. When redness is uncertain or worsening, an in-person piercer
  review or medical evaluation is the appropriate next step.

symptoms:
  - Pink or red skin immediately around the piercing holes
  - Mild warmth limited to the piercing site during early healing
  - Redness that lessens over several days with consistent gentle aftercare
  - Tenderness that matches the amount of visible redness
  - Redness that returns after snagging, sleeping on the site, or product exposure
  - Redness confined to a small area rather than spreading across the ear or face

possible_causes:
  - Normal healing inflammation in fresh and early stages
  - Mechanical irritation from jewelry movement, pressure, or snagging
  - Reaction to harsh soaps, hair products, makeup, or non-recommended aftercare
  - Jewelry material sensitivity in some individuals
  - Over-cleaning or aggressive drying of the piercing site
  - Sun exposure or chlorine contact on a healing piercing
  - Infection concern when redness spreads with swelling, heat, or colored discharge
  - Pre-existing skin conditions affecting the area around the piercing

affected_piercings:
  - ear-piercings
  - nose-piercings
  - cartilage-piercings
