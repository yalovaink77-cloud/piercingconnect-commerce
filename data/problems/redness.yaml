  - lip-and-oral-piercings
  - body-piercings

healing_stages:
  - fresh-piercing
  - early-healing
  - active-healing

risk_level: normal

recommended_actions:
  - Continue gentle saline cleaning or shower rinse as recommended by your piercer
  - Identify and remove sources of friction, pressure, or product contact
  - Keep bedding, phones, and accessories clean when they contact the piercing
  - Avoid changing jewelry prematurely unless your piercer assesses the site
  - Take photos over several days to track whether redness is improving
  - Visit your piercer if redness persists beyond expected early healing or flares repeatedly
  - Seek medical guidance when redness spreads or appears with fever or thick discharge

actions_to_avoid:
  - Applying alcohol, hydrogen peroxide, or strong antiseptics to reduce redness
  - Rubbing or scrubbing the area aggressively during cleaning
  - Covering the piercing with occlusive bandages unless a clinician directs it
  - Assuming all redness means infection or that all redness is harmless without assessment
  - Using topical products marketed for other skin conditions without professional advice
  - Exposing a fresh piercing to pools, hot tubs, or dirty water

when_to_seek_professional_help:
  - Redness spreads beyond the immediate piercing area or forms red streaks
  - Redness intensifies after the first week without an obvious irritation cause
  - The site feels increasingly hot, swollen, or painful alongside redness
  - Discharge becomes thick, yellow, green, or foul-smelling
  - You develop fever or feel generally unwell
  - Redness persists for weeks despite piercer-guided aftercare adjustments
  - A piercer recommends medical evaluation based on what they observe

