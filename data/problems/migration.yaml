id: migration
slug: migration

name: Migration

summary: >
  When jewelry shifts from its original placement and tissue narrows between
  the openings, professional evaluation is needed — migration can progress
  toward rejection if not addressed promptly.

description: |
  Migration describes a piercing complication in which jewelry moves from its
  initial placement — often closer to the skin surface — and the tissue
  between the entry and exit openings becomes narrower over time. The
  Association of Professional Piercers distinguishes migration from rejection:
  migration is movement toward the surface while some viable tissue remains,
  whereas rejection occurs when the piercing migrates past a viable point or
  exits the body entirely.

  Professional guidance notes that a body piercing should have adequate tissue
  depth between openings for safety and longevity. Migration may result from
  unsuitable tissue, improper jewelry size or gauge, poor quality jewelry,
  harsh aftercare, physical trauma, or other factors — and sometimes occurs
  even when placement and care appear appropriate.

  This is a high-risk topic that requires cautious framing. This record does
  not diagnose migration or predict outcomes. A qualified piercer should assess
  jewelry fit, placement, and whether the piercing can remain viable.

symptoms:
  - Jewelry appears to sit closer to the skin surface than when first pierced
  - The channel between entry and exit openings looks narrower over time
  - Angle of jewelry may change from the original placement
  - Skin between openings may look stretched, thin, or irritated
  - Piercing may have been performed on surface or flat anatomy with higher movement risk
  - Changes progress gradually over days or weeks rather than resolving quickly

possible_causes:
  - Insufficient tissue depth or unsuitable anatomy for the chosen placement
  - Jewelry diameter, gauge, or length inappropriate for the piercing site
  - Low-quality or reactive jewelry material
  - Sleeping on, snagging, or repeatedly traumatizing the piercing
  - Harsh aftercare products or over-cleaning delaying healing
  - Excessive swelling followed by jewelry that is too long, causing angle shift
  - Missing recommended downsizing window during early healing
  - Physical stress, illness, or healing variability in some individuals

