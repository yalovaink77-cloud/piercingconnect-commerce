id: infection-concern
slug: infection-concern

name: Infection Concern

summary: >
  Signs that may warrant professional evaluation when a piercing site looks or
  feels worse than expected — this record does not confirm infection.

description: |
  Some piercing changes can look alarming during healing, and it is reasonable
  to wonder whether an infection is involved. Health organizations note that
  piercings can become infected, but many everyday healing symptoms — redness,
  swelling, tenderness, and minor discharge — overlap with normal early healing
  and with irritation from jewelry or aftercare habits.

  This record uses high-caution framing for situations where infection is a
  possible concern worth professional review. It does not diagnose infection
  or any other medical condition. Only a qualified healthcare provider can make
  a clinical determination. A piercer can often help you decide whether to seek
  medical care and may refer you when signs suggest evaluation is appropriate.

  When multiple concerning signs appear together, worsen over time, or are
  accompanied by general illness, prompt professional follow-up is the safest
  approach rather than waiting or relying on online comparisons alone.

symptoms:
  - Increasing pain that does not improve with basic irritation reduction
  - Redness that spreads beyond the immediate piercing area
  - Swelling that worsens after the first few days or affects a large area
  - Warmth around the piercing site
  - Thick, yellow, green, or gray discharge
  - Discharge with a strong or unpleasant odor
  - Fever, chills, or feeling unwell
  - Red streaks extending from the piercing site
  - Jewelry becoming embedded or skin growing over the jewelry
  - Symptoms that persist or worsen despite consistent gentle aftercare

possible_causes:
  - Bacteria entering the piercing site during healing
  - Handling the piercing with unwashed hands
  - Swimming in untreated water or exposing the site to contaminated surfaces
  - Using non-sterile or inappropriate aftercare products
  - Trauma or repeated irritation that breaks down healing tissue
  - Removing jewelry too early, allowing the channel to close partially with debris inside
  - Pre-existing skin conditions or immune factors that may slow healing
  - Misidentifying irritation bumps or normal healing changes as infection

affected_piercings:
  - ear-piercings
  - nose-piercings
  - cartilage-piercings
