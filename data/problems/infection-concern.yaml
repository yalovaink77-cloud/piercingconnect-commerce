  - oral-piercings

healing_stages:
  - fresh-piercing
  - early-healing
  - active-healing

risk_level: urgent-professional-review

recommended_actions:
  - Do not remove jewelry unless a healthcare provider or piercer specifically advises it
  - Continue gentle saline cleaning unless a clinician directs otherwise
  - Contact your piercer promptly for an in-person assessment
  - Seek medical evaluation when signs are worsening, spreading, or accompanied by fever
  - Keep hands clean and avoid touching the site except during approved cleaning
  - Document changes with photos to share with your piercer or clinician if helpful
  - Follow all guidance from qualified professionals rather than social media remedies

actions_to_avoid:
  - Self-diagnosing infection based on photos or online lists alone
  - Applying unprescribed antibiotic creams or taking leftover oral antibiotics
  - Using alcohol, hydrogen peroxide, or harsh antiseptics that may further irritate tissue
  - Removing jewelry without professional guidance when the channel may still be open
  - Ignoring spreading redness, fever, or worsening pain
  - Delaying medical care when symptoms suggest urgent evaluation

when_to_seek_professional_help:
  - Redness or swelling spreads beyond the piercing or worsens over 24 to 48 hours
  - You develop fever, chills, nausea, or feel systemically unwell
  - Discharge is thick, colored, or foul-smelling
  - Pain becomes severe or sudden
  - You see red streaks near the piercing site
  - The area feels hot compared with surrounding skin
  - A piercer recommends same-day or urgent medical evaluation
  - Symptoms do not improve with piercer-guided aftercare adjustments
  - You have diabetes, immune conditions, or other health factors that affect wound healing

