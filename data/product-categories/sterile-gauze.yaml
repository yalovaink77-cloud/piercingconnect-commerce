id: sterile-gauze
slug: sterile-gauze
name: Sterile Gauze
summary: Sterile gauze and non-woven sterile pads are disposable materials used to gently pat dry piercings or absorb fluid. APP troubleshooting references clean gauze or paper products for gentle pressure when bleeding occurs. Gauze supports hygiene but is not itself an active aftercare treatment.
category_type: wound-care
primary_use: Pat dry or protect piercing area with clean disposable material after rinsing.
