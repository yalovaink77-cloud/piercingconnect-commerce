id: mirror
slug: mirror
name: Mirror
summary: Mirrors—including handheld, magnifying, and wearable styles—help clients inspect piercings or assist with jewelry changes when a piercer has cleared timing. Mirrors are inspection tools, not aftercare treatments. PiercingConnect discourages unsupervised early jewelry changes even when mirrors improve visibility.
category_type: tool
primary_use: Visual inspection and jewelry installation assistance for healed or professionally managed piercings.
