name: Compress
summary: Compress products—including gel packs, warm compress pads, or DIY cloth compresses—may sometimes be discussed for comfort around swollen or irritated tissue near a piercing. APP troubleshooting focuses on removing mechanical causes of irritation; compresses are supportive comfort measures, not primary piercing aftercare and not infection treatment.
category_type: accessory
primary_use: Apply cold or warm compress externally to support comfort during swelling or irritation.
