id: foam-soap
slug: foam-soap
name: Foam Soap
summary: Foam soap products are mild cleansers sometimes used in shower routines around healed or healing external piercings. APP body aftercare notes a brief rinse with mild soap during normal bathing may be acceptable for some piercings; foam formats are a commercial variant of gentle cleansing—not a replacement for sterile saline rinsing and not a primary antiseptic treatment.
category_type: cleaning-product
primary_use: Support gentle external cleansing around piercings during normal bathing when approved by piercer.
