name: Wound Wash
summary: Wound wash is a retail and pharmacy labeling category for sterile saline products intended to rinse wounds. APP aftercare guidance specifically references sterile saline wound wash for piercing aftercare. In PiercingConnect taxonomy, wound wash overlaps sterile saline spray but emphasizes wound-care shelf positioning and USP-style labeling rather than piercing-branded marketing alone.
