id: healing-soak
slug: healing-soak
name: Healing Soak
summary: Healing soaks refer to immersing a piercing in warm salt water or commercial soak products. APP aftercare favors packaged sterile saline over home sea-salt soaks because mixing strength, sterility, and contamination are difficult to control. This category documents the commercial and community soak concept for comparison without endorsing uncontrolled home mixing as primary aftercare.
category_type: aftercare-solution
primary_use: Salt-water soaks discussed historically in piercing aftercare; requires caution versus packaged saline.
