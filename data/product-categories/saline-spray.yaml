name: Saline Spray
summary: Saline spray is the parent commercial category for salt-water-based piercing aftercare mists and sprays. It includes APP-aligned sterile isotonic products and formulations with sea salt, enzymes, or other additives that require separate ingredient review. PiercingConnect treats sterile isotonic saline as the professional baseline while cataloging broader saline sprays for comparison content.
