id: sterile-saline-spray
slug: sterile-saline-spray
name: Sterile Saline Spray
summary: Sterile saline sprays deliver 0.9% sodium chloride in sterile water for wound rinsing. APP aftercare guidance recommends packaged sterile saline labeled for wound washing rather than home-mixed solutions. This category covers piercing-branded and pharmacy-style sterile saline sprays when formulation and labeling meet professional aftercare standards.
category_type: aftercare-solution
primary_use: Rinse healing piercings with packaged sterile isotonic saline without harsh additives.
