id: irritated-piercing
slug: irritated-piercing
name: Irritated Piercing
summary: >
  A state of heightened local irritation that may occur at any point in the healing timeline when mechanical, chemical, or jewelry-related triggers are present. Not a diagnosis.
description: >
  An irritated piercing describes a condition of localized inflammation often linked to identifiable triggers such as snagging, sleeping pressure, harsh aftercare products, inappropriate jewelry, over-cleaning, or moisture trapping.
  APP troubleshooting notes that irritation and allergy are more common than infection when piercings are properly performed.
  Irritation can occur during fresh, early, active, late, or even mature stages.
  This record describes an irritation state, not a medical diagnosis.
  Removing the irritation source and returning to gentle saline care may help many cases, but persistent or worsening symptoms require piercer or medical evaluation.
typical_timeframe: >
  May last days to weeks depending on trigger removal and piercing context. No fixed recovery timeline applies.
normal_signs:
  - Localized redness, warmth, or swelling near the jewelry
  - Tenderness or itching without systemic illness
  - Small irritation bump adjacent to the piercing in some cases
  - Symptoms that may improve when mechanical triggers are removed
  - Symptoms confined locally rather than spreading widely — not diagnostic
caution_signs:
  - Symptoms persisting after obvious irritation sources are addressed
  - Thick colored discharge, fever, or red streaks that may suggest medical concern
  - Bump growing rapidly or channel narrowing
  - Repeated flares suggesting jewelry material or fit problems
  - Difficulty distinguishing irritation from infection without professional help
common_problems:
