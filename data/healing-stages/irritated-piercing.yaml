  - h2ocean-piercing-aftercare-spray
suitable_ingredients:
  - sterile-water
  - sodium-chloride-0.9-percent
ingredients_to_avoid:
  - alcohol
  - hydrogen-peroxide
  - tea-tree-oil
  - tea-tree-oil
  - benzalkonium-chloride
  - sea-salt
jewelry_guidance:
  - Identify and remove mechanical triggers before changing jewelry unnecessarily
  - Consult a piercer to assess fit, material, and whether a change is appropriate
  - Leave jewelry in place unless a piercer advises otherwise — removal may complicate irritation or infection concerns
  - Avoid experimental home remedies marketed for bumps
cleaning_guidance:
  - Return to simple sterile saline rinsing once or twice daily if piercer agrees
  - Stop alcohol, hydrogen peroxide, tea tree oil, and harsh soaps immediately
  - Reduce cleaning frequency if over-cleaning contributed to dryness or irritation
  - Keep the area dry and protected from further trauma between cleanings
when_to_seek_help:
  - Irritation that does not improve after removing likely triggers within a reasonable period
  - Signs that may suggest infection requiring medical evaluation
  - Suspected migration, rejection, or embedding
  - Piercer unable to identify cause — consider second opinion from an APP-aligned professional
