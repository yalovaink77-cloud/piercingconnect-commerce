jewelry_guidance:
  - Consult a piercer about downsizing when swelling allows — timing varies by piercing
  - Maintain implant-grade or piercer-approved jewelry unless professionally changed
  - Protect the piercing from snagging, sleeping pressure, and tight clothing
  - Do not force jewelry changes before the channel can tolerate them
cleaning_guidance:
  - Continue gentle sterile saline rinsing as directed; once or twice daily is common for body piercings
  - Remove obvious debris and dried discharge gently without picking aggressively
  - Avoid introducing new harsh products or home remedies without piercer input
  - Keep the area dry between cleanings when possible
when_to_seek_help:
  - Irritation bumps or symptoms that do not improve after removing mechanical causes
  - Suspected migration, rejection, or embedding changes
  - Signs that may warrant medical evaluation alongside piercer assessment
  - Uncertainty about downsizing timing — ask your piercer in person
