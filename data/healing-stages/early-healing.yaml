id: early-healing
slug: early-healing
name: Early Healing
summary: >
  The period when initial acute symptoms may begin to settle while the piercing channel is still fragile. Duration varies by piercing type, anatomy, jewelry, health, and aftercare.
description: >
  Early healing follows the fresh piercing stage as inflammation may begin to ease and the body starts building new tissue in the channel.
  Swelling, redness, and crusting may still occur but often change in character over time.
  This is not a uniform timeline — cartilage, oral, navel, and surface piercings may behave differently from earlobe piercings.
  Downsizing or jewelry assessment may be discussed with a piercer during this window for some piercings.
  Individual health, sleep habits, trauma from snagging, and aftercare consistency strongly affect progress.
  No fixed calendar applies to all piercings.
typical_timeframe: >
  Commonly spans several weeks for simpler piercings and may extend into months for cartilage or body piercings. Your piercer can help set realistic expectations for your specific piercing.
normal_signs:
  - Gradual reduction in initial swelling for many piercings
  - Ongoing mild tenderness with movement or pressure
  - Intermittent crusting around the jewelry
  - Itching that may occur as tissue remodels
  - Channel still fragile to trauma or premature jewelry changes
caution_signs:
  - Development of a persistent bump near the piercing
  - Increasing redness or swelling after initial improvement
  - Repeated snagging or sleeping irritation slowing progress
  - Jewelry length appearing too long or too short as swelling changes
  - Signs that may suggest migration or angle change
