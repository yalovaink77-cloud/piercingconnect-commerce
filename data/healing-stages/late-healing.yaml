  - hydrogen-peroxide
  - tea-tree-oil
jewelry_guidance:
  - Discuss jewelry style changes only after piercer confirms channel stability
  - Continue quality material choices; healed piercings can still react to poor metal
  - Downsize or adjust jewelry that still moves excessively in the channel
  - Retire piercings showing progressive migration when a piercer recommends it
cleaning_guidance:
  - Saline rinsing may be reduced in frequency only with piercer guidance
  - Resume gentle cleaning after sports, swimming, or known contamination exposure
  - Avoid harsh products even when the piercing feels mostly healed
  - Maintain hand hygiene before handling jewelry
when_to_seek_help:
  - New migration, rejection, or embedding signs in late healing
  - Persistent bumps that return after irritation sources are removed
  - Pain or discharge returning after a period of stability
  - Piercer evaluation before first self-directed jewelry change if unsure
