  - steri-wash-saline-spray
  - easypiercing-saline-solution-50ml
unsuitable_products:
  - base-laboratories-piercing-aftercare-spray
  - inverness-ear-care-solution
  - studex-advanced-2-in-1-piercing-aftercare-cleanser
  - h2ocean-piercing-aftercare-spray
suitable_ingredients:
  - sterile-water
  - sodium-chloride-0.9-percent
ingredients_to_avoid:
  - alcohol
  - hydrogen-peroxide
  - tea-tree-oil
  - benzalkonium-chloride
  - sea-salt
jewelry_guidance:
  - Leave initial jewelry in place unless a qualified piercer advises a change
  - Initial jewelry should be implant-grade or piercer-approved material with appropriate length for swelling
  - Do not change jewelry at home during this stage without professional guidance
  - Avoid unnecessary rotation, twisting, or removal of jewelry
cleaning_guidance:
  - Spray or rinse with sterile saline labeled for wound wash once or twice daily per piercer guidance
  - Avoid alcohol, hydrogen peroxide, harsh soaps, and ointments on the open wound
  - Wash hands before touching the area or jewelry
  - Do not over-clean; excessive cleaning may irritate tissue
when_to_seek_help:
  - Signs that may suggest infection such as spreading redness, fever, or foul discharge
  - Jewelry that appears embedded or too tight to clean around
  - Bleeding that is heavy or does not slow with gentle care
  - Any concern about placement, angle, or jewelry fit — consult your piercer promptly
