id: active-healing
slug: active-healing
name: Active Healing
summary: >
  A mid-healing phase when the channel may still be forming but daily symptoms are often less acute. Progress depends on piercing type, anatomy, jewelry, health, and consistent aftercare.
description: >
  Active healing describes ongoing channel maturation after the most acute early phase.
  The piercing may feel improved day to day while still vulnerable to irritation, snagging, and premature jewelry changes.
  Many piercings remain in this phase for weeks to months depending on location.
  Cartilage and body piercings often require longer timelines than earlobes.
  Aftercare should remain consistent and conservative unless a piercer recommends adjustments.
  Healing is not linear — temporary flares may occur after travel, illness, stress, or mechanical trauma.
typical_timeframe: >
  May last from several weeks to many months depending on piercing type and individual factors. There is no guaranteed end date for any piercing category.
normal_signs:
  - Less frequent acute swelling episodes for many piercings
  - Occasional mild tenderness or itching
  - Channel may still secrete small amounts of fluid during cleaning
  - Jewelry may feel stable when not disturbed
  - Healing progress may appear uneven week to week
caution_signs:
  - Delayed improvement compared with piercer expectations for your anatomy
  - Recurrent bumps after mechanical irritation resolves
  - Dryness or over-cleaning symptoms slowing comfort
  - Jewelry quality or fit concerns emerging during longer healing
  - Persistent moisture trapping from clothing, hair, or bandages
common_problems:
