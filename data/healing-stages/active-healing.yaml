unsuitable_products: []
suitable_ingredients:
  - sterile-water
  - sodium-chloride-0.9-percent
  - purified-water
ingredients_to_avoid:
  - alcohol
  - hydrogen-peroxide
  - tea-tree-oil
jewelry_guidance:
  - Maintain appropriate jewelry size and material until a piercer confirms readiness for change
  - Evaluate whether long or heavy jewelry contributes to movement or angle issues
  - Avoid experimental jewelry materials during unfinished healing
  - Schedule check-ups with a piercer if healing seems stalled
cleaning_guidance:
  - Maintain a sustainable saline or shower-rinse routine per piercer guidance
  - Balance cleaning with avoiding over-cleaning that may dry or irritate tissue
  - Address moisture trapping from hair products, tight clothing, or occlusive dressings
  - Do not assume reduced symptoms mean aftercare can stop entirely
when_to_seek_help:
  - Healing that appears stalled beyond your piercer's expected range for your piercing
  - New bumps, migration signs, or allergic-type reactions
  - Uncertainty about jewelry change readiness
  - Medical evaluation if signs may suggest infection or systemic illness
