id: threadless-jewelry
slug: threadless-jewelry
name: Threadless Jewelry
summary: Threadless or press-fit jewelry uses a pin coupling on the decorative end with no screw threads at the connection. APP initial jewelry guidance lists threadless jewelry as an acceptable alternative to internally threaded jewelry because the post passing through tissue can remain smooth.
jewelry_form: construction-threadless
suitable_for_fresh_piercings: 'true'
suitable_for_healed_piercings: 'true'
