id: internally-threaded-jewelry
slug: internally-threaded-jewelry
name: Internally Threaded Jewelry
summary: Internally threaded jewelry places screw threads inside the removable end, leaving the post that passes through tissue smooth. APP initial jewelry guidance states internally threaded jewelry is part of the APP standard for initial piercing jewelry because it avoids scraping tissue with external thread ridges.
jewelry_form: construction-internal-thread
