id: externally-threaded-jewelry
slug: externally-threaded-jewelry
name: Externally Threaded Jewelry
summary: Externally threaded jewelry has screw threads cut into the post itself, so the comparatively rough thread surface may pass through tissue during insertion and removal. APP initial jewelry guidance contrasts this with internally threaded jewelry, which is part of the APP standard for initial piercing jewelry.
jewelry_form: construction-external-thread
suitable_for_fresh_piercings: 'false'
suitable_for_healed_piercings: caution
common_piercing_types: []
suitable_materials:
- mystery-metal
- surgical-steel
- plated-jewelry
risks:
- Thread ridges may scrape healing tissue during insertion and jewelry changes per APP
- Common in low-cost marketplace body jewelry with poor polish
- May combine with non-implant-grade metals and plated surfaces
- External threads can trap debris and bacteria in thread grooves
- Increased mechanical trauma may contribute to irritation bumps or delayed healing
aftercare_considerations:
- APP favors internally threaded or threadless jewelry for fresh piercings—ask piercer to replace externally threaded jewelry if present
- Do not purchase externally threaded jewelry for unhealed piercings
- If already inserted, avoid unnecessary removal; seek professional assessment
- Maintain sterile saline aftercare while planning professional jewelry upgrade
- Document irritation timing relative to jewelry source and threading type for piercer review
app_alignment: not-recommended
