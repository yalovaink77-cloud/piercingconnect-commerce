id: flat-back-labret
slug: flat-back-labret
name: Flat-Back Labret
summary: A labret-style post with a flat disk on the interior side and a removable decorative or plain end on the exterior. APP initial jewelry guidance favors styles suited to placement; flat-back labret posts are widely used for ear cartilage, nostril, and lip piercings when length, gauge, and threading meet professional standards.
