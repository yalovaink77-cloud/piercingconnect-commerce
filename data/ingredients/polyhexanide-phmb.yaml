description: Polyhexanide (polyhexamethylene biguanide, PHMB) is an antimicrobial agent used in medical device and wound-care contexts. Prontolind piercing aftercare products use a polyhexanide-betaine complex for antimicrobial cleaning. This is not isotonic sterile saline. Professional use in European studios is documented by the manufacturer, but APP primary body aftercare guidance centers on sterile saline rather than antimicrobial soaks for routine care.
ingredient_type: antimicrobial
purpose: Antimicrobial cleansing in professional piercing and wound-care formulations.
evidence_level: moderate
