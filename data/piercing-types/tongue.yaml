  - easypiercing-saline-solution-50ml
  - easypiercing-saline-solution-50ml
suitable_materials:
  - implant-grade-titanium
  - niobium
  - 14k-gold
  - 18k-gold
suitable_jewelry:
  - straight-barbell
downsizing: >
  Oral piercings commonly require shorter jewelry after initial swelling; APP notes excessively long oral jewelry can damage teeth and gums. Piercer should perform downsizing.
pain_level: moderate-to-high
aftercare_notes:
  - Use alcohol-free antiseptic mouthwash 4–5 times daily for oral piercings per APP oral guidance
  - Rinse after meals and before bed; use soft-bristled toothbrush carefully around jewelry
  - Avoid oral contact and unprotected sexual or oral activity during early healing per piercer guidance
  - Avoid alcohol-based mouthwash and harsh rinses unless piercer directs otherwise
  - Expect significant initial swelling; ice and cold water may help comfort per piercer guidance
when_to_seek_help:
  - Signs that may suggest infection such as spreading redness, fever, or foul discharge
  - Suspected migration, rejection, or embedding
  - Irritation bumps that persist after removing mechanical triggers
  - Uncertainty about jewelry fit — consult your piercer in person
  - Difficulty breathing or swallowing — seek urgent medical care
