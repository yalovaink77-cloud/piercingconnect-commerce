name: Tongue
body_location: oral
summary: >
  Tongue piercing through the tongue midline when anatomically suitable. APP oral aftercare guidance applies; healing varies.
anatomy: >
  Midline tongue muscle tissue; vascular; piercer assesses webbing and vein placement.
common_jewelry:
  - straight-barbell
  - longer-barbell-initial
healing_time: >
  Oral and lip piercings involve mucosal tissue that may heal on a different schedule than external skin. Timelines vary; follow piercer oral aftercare guidance.
healing_stages:
  - fresh-piercing
  - early-healing
  - active-healing
  - late-healing
  - mature-piercing
  - irritated-piercing
