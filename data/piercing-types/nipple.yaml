downsizing: >
  Bar length should accommodate swelling without embedding; piercer downsizing timing varies individually.
pain_level: moderate-to-high
aftercare_notes:
  - Sterile saline rinse per APP body aftercare guidance
  - Wear breathable, non-occlusive clothing; avoid compression when possible
  - Avoid trauma from sports, bags, or sleeping pressure
  - Follow piercer guidance on sexual contact and barrier use during healing
when_to_seek_help:
  - Signs that may suggest infection such as spreading redness, fever, or foul discharge
  - Suspected migration, rejection, or embedding
  - Irritation bumps that persist after removing mechanical triggers
  - Uncertainty about jewelry fit — consult your piercer in person
  - Pregnancy or breastfeeding planning — review APP nipple guidance with piercer and clinician
