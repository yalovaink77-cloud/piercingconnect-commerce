  - steri-wash-saline-spray
  - easypiercing-saline-solution-50ml
suitable_materials:
  - implant-grade-titanium
  - niobium
  - 14k-gold
  - 18k-gold
suitable_jewelry:
  - labret-post-flat-back
  - nose-screw
  - hoop-after-healing
downsizing: >
  Initial jewelry is often longer to accommodate swelling. APP notes missing the downsizing window for helix-type piercings may contribute to migration or angle change. Piercer should downsize — timing varies.
pain_level: moderate
aftercare_notes:
  - Spray sterile saline labeled for wound wash once or twice daily per APP body aftercare
  - Avoid sleeping on the piercing; use travel pillow or pressure protection if needed
  - Do not rotate or move jewelry during cleaning
  - Avoid alcohol, hydrogen peroxide, tea tree oil, and harsh antiseptics
  - Return to piercer for downsizing when initial swelling subsides
  - Avoid makeup and skincare on the site during early healing
when_to_seek_help:
  - Signs that may suggest infection such as spreading redness, fever, or foul discharge
  - Suspected migration, rejection, or embedding
  - Irritation bumps that persist after removing mechanical triggers
  - Uncertainty about jewelry fit — consult your piercer in person
