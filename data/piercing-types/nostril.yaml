id: nostril
slug: nostril
name: Nostril
body_location: nose
summary: >
  Nostril piercing through the side wall of the nose. APP groups nostrils with tougher tissue that may take six months or longer to heal.
anatomy: >
  Soft tissue and cartilage of the nostril rim or wall; exact angle and depth vary by anatomy.
common_jewelry:
  - nose-screw
  - labret-post
  - hoop-after-healing
healing_time: >
  Nostril piercings are grouped with tougher tissue that may take six months or longer per APP guidance. Individual variation is significant.
healing_stages:
  - fresh-piercing
  - early-healing
  - active-healing
  - late-healing
  - mature-piercing
  - irritated-piercing
common_problems:
  - irritation-bump
  - swelling
  - crusting
  - delayed-healing
  - infection-concern
