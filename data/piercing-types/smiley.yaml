id: smiley
slug: smiley
name: Smiley
body_location: oral
summary: >
  Frenulum piercing through the upper lip frenulum (smile line). Delicate oral tissue; anatomy suitability varies; healing timelines vary.
anatomy: >
  Upper labial frenulum inside the mouth; not suitable for all anatomies.
common_jewelry:
  - circular-barbell
  - small-hoop
healing_time: >
  Oral and lip piercings involve mucosal tissue that may heal on a different schedule than external skin. Timelines vary; follow piercer oral aftercare guidance.
healing_stages:
  - fresh-piercing
  - early-healing
  - active-healing
  - late-healing
  - mature-piercing
  - irritated-piercing
  - retired-piercing
common_problems:
  - swelling
  - crusting
  - moisture-irritation
  - overcleaning
  - infection-concern
  - migration
  - rejection
recommended_products:
  - neilmed-piercing-aftercare-fine-mist
  - recovery-sterile-saline-wash-7-4oz
  - steri-wash-saline-spray
  - easypiercing-saline-solution-50ml
suitable_materials:
  - implant-grade-titanium
  - niobium
  - 14k-gold
  - 18k-gold
suitable_jewelry:
  - circular-barbell
  - small-hoop
downsizing: >
  Oral piercings commonly require shorter jewelry after initial swelling; APP notes excessively long oral jewelry can damage teeth and gums. Piercer should perform downsizing.
pain_level: low-to-moderate
aftercare_notes:
  - Use alcohol-free antiseptic mouthwash 4–5 times daily for oral piercings per APP oral guidance
  - Rinse after meals and before bed; use soft-bristled toothbrush carefully around jewelry
  - Avoid oral contact and unprotected sexual or oral activity during early healing per piercer guidance
  - Avoid alcohol-based mouthwash and harsh rinses unless piercer directs otherwise
when_to_seek_help:
  - Signs that may suggest infection such as spreading redness, fever, or foul discharge
  - Suspected migration, rejection, or embedding
  - Irritation bumps that persist after removing mechanical triggers
  - Uncertainty about jewelry fit — consult your piercer in person
  - Frenulum tear or gum recession concerns — consult piercer or dentist
