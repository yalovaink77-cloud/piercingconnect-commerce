id: surgical-steel
slug: surgical-steel
name: Surgical Steel
summary: Surgical steel is a marketing term covering many stainless steel alloys. APP initial jewelry guidance states only specific grades are proven biocompatible, including ASTM F-138 compliant or ISO 5832-1 compliant steel and related ISO 10993 or EEC Nickel Directive compliance. Unspecified "surgical steel" without documented grade is not equivalent to implant-grade steel.
material_type: metal-alloy
suitable_for_fresh_piercings: caution
suitable_for_healed_piercings: caution
allergy_risk: moderate
biocompatibility_notes: APP emphasizes that many alloys are used for body jewelry but only certain grades are proven biocompatible for fresh piercings. Mill test certificates with ASTM or ISO designations document grade; consumers need not interpret certificate numbers but should know documentation exists when piercers review supplier quality. Labeling alone—such as "316L surgical steel" without verified compliance—does not replace professional verification. Nickel content in non-compliant alloys may contribute to sensitivity in some individuals.
app_alignment: acceptable-with-caution
common_use_cases:
- Body jewelry when piercer confirms ASTM F-138 or ISO 5832-1 compliant grade
- Healed piercings where client tolerates steel and grade is verified
- Not interchangeable with generic mall or fashion "surgical steel" labels
risks:
- Nickel and other alloy components may trigger sensitivity in some people
- Unverified surgical steel may not meet biocompatibility standards APP lists
- Marketing term overuse obscures actual alloy grade and nickel release
- Poor polish or external threading compounds mechanical and biocompatibility risks
