id: ptfe
slug: ptfe
name: PTFE
summary: PTFE (polytetrafluoroethylene), sometimes sold as flexible piercing retainers or temporary bars, is not listed in APP initial jewelry guidance among materials proven appropriate for fresh piercings. Professional use, if any, is typically limited to specific healed or temporary contexts determined by a piercer.
material_type: polymer
suitable_for_fresh_piercings: 'false'
suitable_for_healed_piercings: caution
allergy_risk: low
biocompatibility_notes: APP initial jewelry brochure does not include PTFE in its list of materials with proven biocompatibility for fresh piercings. PTFE is flexible and may appear in retainers; flexibility can reduce certain mechanical stresses but also introduces movement and fit variables. PiercingConnect classifies APP alignment as not-addressed rather than recommended. Any use during healing should follow in-person piercer guidance only.
app_alignment: not-addressed
common_use_cases:
- Flexible retainers sometimes discussed for healed pierings or temporary concealment
- Not an APP-listed initial jewelry material
- Professional assessment required before any use in or near a healing piercing
risks:
- Not proven appropriate for fresh piercings under APP initial jewelry guidance
- Flexible jewelry may move excessively and cause irritation in some placements
- Low-quality PTFE products may have rough ends or poor fit
- Self-insertion of retainers during early healing may cause trauma
